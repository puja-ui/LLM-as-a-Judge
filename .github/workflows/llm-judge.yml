name: LLM Quality Evaluation

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Debug Secrets
        env:
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_GEMINI: ${{ secrets.GEMINI_API_KEY != '' }}
        run: |
          echo "Is OpenAI key present in GitHub Secrets? $HAS_OPENAI"
          echo "Is Gemini key present in GitHub Secrets? $HAS_GEMINI"

      - name: Run evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm test

      - name: Print report
        run: cat LAAGoutput.txt

      - name: Upload report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: llm-judge-report
          path: reports/